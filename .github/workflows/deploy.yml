name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env and deploy via SSH
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          GCE_ZONE: ${{ secrets.GCE_ZONE }}
          GCE_USER: ${{ secrets.GCE_USER }}
          GCE_INSTANCE: ${{ secrets.GCE_INSTANCE }}
        run: |
          gcloud compute ssh \
            --tunnel-through-iap \
            --zone "$GCE_ZONE" \
            "$GCE_USER@$GCE_INSTANCE" \
            -- "cd ~/client-dashboard && git pull origin main && printf 'DB_PASSWORD=%s\nSECRET_KEY=%s\nCREDENTIAL_ENCRYPTION_KEY=%s\nACCESS_TOKEN_EXPIRE_HOURS=8\n' '$DB_PASSWORD' '$SECRET_KEY' '$CREDENTIAL_ENCRYPTION_KEY' > .env && docker compose up -d --build"
