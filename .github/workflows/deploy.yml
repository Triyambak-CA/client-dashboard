name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 3
          EOF

      - name: Write .env file
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "CREDENTIAL_ENCRYPTION_KEY=${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}" >> .env
          echo "ACCESS_TOKEN_EXPIRE_HOURS=8" >> .env

      - name: Copy files to VM
        run: |
          scp -i ~/.ssh/id_rsa -r frontend/dist "${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/client-dashboard/frontend/"
          scp -i ~/.ssh/id_rsa .env "${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:~/client-dashboard/.env"

      - name: SSH into VM and redeploy
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}" \
            "cd ~/client-dashboard && git pull origin main && docker compose up -d --build"
