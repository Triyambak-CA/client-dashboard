name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env file
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "CREDENTIAL_ENCRYPTION_KEY=${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}" >> .env
          echo "ACCESS_TOKEN_EXPIRE_HOURS=8" >> .env

      - name: Copy files to VM via IAP tunnel
        run: |
          gcloud compute scp --recurse \
            --tunnel-through-iap \
            --zone "${{ secrets.GCE_ZONE }}" \
            frontend/dist "${{ secrets.GCE_INSTANCE }}:~/client-dashboard/frontend/"
          gcloud compute scp \
            --tunnel-through-iap \
            --zone "${{ secrets.GCE_ZONE }}" \
            .env "${{ secrets.GCE_INSTANCE }}:~/client-dashboard/.env"

      - name: SSH into VM and redeploy
        run: |
          gcloud compute ssh \
            --tunnel-through-iap \
            --zone "${{ secrets.GCE_ZONE }}" \
            "${{ secrets.GCE_USER }}@${{ secrets.GCE_INSTANCE }}" \
            -- "cd ~/client-dashboard && git pull origin main && docker compose up -d --build"
